<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f1f5f9;
      color: #102a43;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(16, 42, 67, 0.12);
      padding: 32px;
      margin: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 1.9rem;
      letter-spacing: -0.02em;
      text-align: center;
    }

    p {
      margin-top: 0.5rem;
      color: #486581;
      text-align: center;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d9e2ec;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 0.98rem;
      color: #102a43;
      box-sizing: border-box;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .form-row .form-group {
      margin-bottom: 0;
    }

    .form-actions {
      display: flex;
      justify-content: center;
      margin-top: 24px;
    }

    .btn-submit {
      background: #1d4ed8;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px 22px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-submit:hover {
      background: #1e40af;
    }

    @media (max-width: 560px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Student Registration</h1>
    <p>Fill out the form below to register a new student.</p>

    <form action="#" method="post">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" required placeholder="Enter first name" />
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" required placeholder="Enter last name" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="student@example.com" />
        </div>
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" required placeholder="+1 555 123 4567" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required />
        </div>
        <div class="form-group">
          <label for="gender">Gender</label>
          <select id="gender" name="gender" required>
            <option value="" disabled selected>Select gender</option>
            <option value="female">Female</option>
            <option value="male">Male</option>
            <option value="nonbinary">Non-binary</option>
            <option value="preferNot">Prefer not to say</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="grade">Grade / Year</label>
          <select id="grade" name="grade" required>
            <option value="" disabled selected>Select grade</option>
            <option value="freshman">Freshman</option>
            <option value="sophomore">Sophomore</option>
            <option value="junior">Junior</option>
            <option value="senior">Senior</option>
          </select>
        </div>
        <div class="form-group">
          <label for="course">Course</label>
          <input type="text" id="course" name="course" required placeholder="Enter course or major" />
        </div>
      </div>

      <div class="form-group">
        <label for="address">Address</label>
        <textarea id="address" name="address" placeholder="Street address, city, state, zip" required></textarea>
      </div>

      <div class="form-actions">
        <button class="btn-submit" type="submit">Register Student</button>
      </div>
    </form>
  </div>
</body>
</html>
